<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meus Sites</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container central */
.container {
    background-color: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    width: 350px;
}

/* Título */
h1 {
    margin-bottom: 10px;
    color: #333;
}

/* Texto */
p {
    color: #666;
    margin-bottom: 20px;
}

/* Lista */
ul {
    list-style: none;
    padding: 0;
}

/* Itens */
li {
    margin: 10px 0;
}

/* Links como botões */
a {
    display: block;
    text-decoration: none;
    background-color: #4facfe;
    color: white;
    padding: 12px;
    border-radius: 8px;
    transition: 0.3s;
    font-weight: bold;
}

/* Hover */
a:hover {
    background-color: #0077ff;
    transform: scale(1.05);
}
</style>

</head>

<body>

<div class="container">
    <h1>Projetos Frontend 2026</h1>
    <p>Escolha um dos sites abaixo:</p>

    <ul>
        <li><a href="atividade Front-end Colecionador/">Abrir site colecionador (atividade 1)</a></li>
        <li><a href="atividade Front-end Material de Estudos/">Abrir Material de estudos (atividade 2)</a></li>
        <li><a href="atividade Front-end Arquivo Confuso da Computação">Abrir Arquivo confuso da computação (atividade 3)</a></li>
        <li><a href="atividade Front-end Arquivo Confuso da computação (daysiUI)">Abrir Arquivo confuso da computação (daysiUI) (atividade 4)</a></li>
    </ul>
</div>

</body>
</html>
