<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamento de Eventos</title>

<style>
    body{
        font-family: Arial;
        background:#f2f2f2;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .card{
        background:white;
        padding:30px;
        border-radius:10px;
        width:400px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
        text-align:center;
    }

    label{
        display:block;
        margin-top:15px;
    }

    input, select{
        width:100%;
        padding:10px;
        margin-top:5px;
    }

    button{
        width:100%;
        margin-top:20px;
        padding:12px;
        border:none;
        background:#3498db;
        color:white;
        font-size:16px;
        cursor:pointer;
        border-radius:5px;
    }

    .resultado{
        margin-top:20px;
        background:#f7f7f7;
        padding:15px;
        border-radius:5px;
    }
</style>
</head>
<body>

<div class="card">
    <h1>Eventos Infinity</h1>

    <label>Pacote</label>
    <select id="pacote">
        <option value="50">Standard</option>
        <option value="80">Premium</option>
        <option value="120">Infinity Deluxe</option>
    </select>

    <label>Quantidade de Pessoas</label>
    <input type="number" id="pessoas">

    <button onclick="calcular()">Calcular Orçamento</button>

    <div class="resultado" id="resultado"></div>
</div>

<script>
    function calcular(){

        const valorPacote = Number(document.getElementById("pacote").value);
        const pessoas = Number(document.getElementById("pessoas").value);

        const bruto = valorPacote * pessoas;

        const taxa = bruto * 0.10;

        let total = bruto + taxa;

        let desconto = 0;

        if(pessoas > 100){
            desconto = total * 0.05;
            total -= desconto;
        }

        document.getElementById("resultado").innerHTML = `
            <p><strong>Custo Bruto:</strong> R$ ${bruto.toFixed(2)}</p>
            <p><strong>Taxa de Serviço:</strong> R$ ${taxa.toFixed(2)}</p>
            <p><strong>Desconto:</strong> R$ ${desconto.toFixed(2)}</p>
            <p><strong>Total Final:</strong> R$ ${total.toFixed(2)}</p>
        `;
    }
</script>

</body>
</html>
