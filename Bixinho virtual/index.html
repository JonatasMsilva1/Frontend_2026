<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Meu Pet Virtual</title>
</head>

<style>

    body {
        background-image: url('imagem de fundo.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

</style>

<body class="bg-pink-50 min-h-screen flex flex-col">

    <div class="w-full flex items-center justify-start p-4 gap-4">

        <div class="avatar">
            <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                <img src="comendo-removebg-preview.png" />
            </div>
        </div>

        <input 
            type="text" 
            placeholder="Nome da criatura..." 
            class="input input-secondary"
        />

    </div>

    <div class="flex flex-col items-center justify-end w-full px-4 gap-6 flex-1 pb-2">

    <progress 
        id="vidaBar"
        class="progress progress-success w-56" 
        value="100" 
        max="100">
    </progress>

    <!-- BIXINHO -->
    <img 
        id="b"
        src="normal-removebg-preview.png"
        alt="Imagem principal"
        class="w-full max-w-2xl h-auto drop-shadow-[0_20px_30px_rgba(0,0,0,0.6)]"
        
    />

    <!-- COOKIE -->
    <img 
        id="btn"
        src="cookie-removebg-preview.png"
        alt="Botão"
        class="w-[220px] h-auto active:scale-95 hover:scale-105 transition duration-200 cursor-pointer"
        onclick="alimentar()"
    />  

    <!-- BOTÃO DARK MODE -->
    <button 
        onclick="alternarDiaNoite()" 
        class="w-[220px] h-auto drop-shadow-xl active:scale-95 hover:scale-105 transition duration-200 cursor-pointer">
        
        🌞 | 🌙 Alternar
        
    </button>

    </div>

</body>

<script src="script.js"></script>

</html>
