<!DOCTYPE html>
<html lang="pt-br">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Meu Pet Virtual</title>
 
    <style>
        body {
            background-image: url('imagem de fundo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1s ease;
        }
 
        :root { --pet-size: 25%; }
 
        #pet-wrapper {
            position: relative;
            display: block;
            width: var(--pet-size);
            flex-shrink: 0;
        }
 
        .eye {
            position: absolute;
            width: 28px;
            height: 28px;
            background: #fff;
            border-radius: 50%;
            border: 2.5px solid #2a1a0e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            pointer-events: none;
            transition: height 0.2s, border-radius 0.2s, background 0.2s;
        }
 
        #eye-left  { top: 32%; left: 47%; }
        #eye-right { top: 31%; left: 56%; }
 
        .eye-pupil {
            width: 13px;
            height: 13px;
            background: #1a0a00;
            border-radius: 50%;
            transition: transform 0.06s linear;
            pointer-events: none;
        }
 
        .eye.sleeping {
            height: 5px;
            border-radius: 0 0 14px 14px;
            background: #2a1a0e;
        }
        .eye.sleeping .eye-pupil { display: none; }
 
        .eye.dead {
            background: transparent;
            border-color: #555;
            font-size: 16px;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .eye.dead::after { content: "✕"; font-weight: bold; }
        .eye.dead .eye-pupil { display: none; }
 
        #dirt-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: 40%;
            background:
                radial-gradient(circle at 28% 65%, rgba(90,55,20,0.45) 0%, transparent 55%),
                radial-gradient(circle at 72% 28%, rgba(80,50,15,0.35) 0%, transparent 50%),
                radial-gradient(circle at 55% 80%, rgba(100,60,10,0.40) 0%, transparent 40%);
            opacity: 0;
            transition: opacity 0.6s ease;
        }
 
        .zzz-float {
            position: absolute;
            pointer-events: none;
            animation: floatZzz 2.2s ease-in forwards;
            font-size: 1.6rem;
            user-select: none;
        }
        @keyframes floatZzz {
            0%   { opacity: 1; transform: translateY(0) scale(0.7); }
            60%  { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(-70px) scale(1.3); }
        }
 
        .achievement-toast {
            animation: toastIn 0.4s cubic-bezier(.34,1.56,.64,1), toastOut 0.4s ease 3.6s forwards;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(16px) scale(0.9); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes toastOut {
            to   { opacity: 0; transform: translateY(-10px); }
        }
 
        @keyframes pulseDirt {
            0%, 100% { box-shadow: 0 0 0 0 rgba(210,130,30,0.5); }
            50% { box-shadow: 0 0 0 8px rgba(210,130,30,0); }
        }
        .dirty-pulse { animation: pulseDirt 1.4s ease infinite; }
    </style>
</head>
 
<body class="bg-pink-50 min-h-screen flex flex-col select-none">
 
    <div class="w-full flex items-center justify-start p-4 gap-3 flex-wrap">
 
        <div class="avatar">
            <div class="w-14 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                <img src="comendo-removebg-preview.png" alt="avatar" />
            </div>
        </div>
 
        <input
            type="text"
            placeholder="Nome da criatura..."
            class="input input-secondary input-sm"
        />
 
        <button
            onclick="toggleConquistas()"
            class="btn btn-xs btn-outline ml-auto gap-1"
        >🏆 <span id="achievement-count">0</span>/<span id="achievement-total">5</span></button>
    </div>
 
    <div id="conquistas-panel" class="hidden mx-4 mb-2 p-3 bg-white/80 backdrop-blur rounded-2xl shadow-lg border border-white/60">
        <p class="font-bold text-sm mb-2 text-gray-700">🏆 Conquistas</p>
        <div id="conquistas-lista" class="flex flex-col gap-1.5"></div>
    </div>
 
    <div class="flex flex-col items-center gap-1.5 px-4 mt-1">
 
        <div class="flex items-center gap-2 w-60">
            <span class="text-base w-5 text-center">❤️</span>
            <progress id="vidaBar" class="progress progress-success flex-1" value="100" max="100"></progress>
            <span id="vidaVal" class="text-xs text-gray-500 w-7 text-right">100</span>
        </div>
 
        <div class="flex items-center gap-2 w-60">
            <span class="text-base w-5 text-center">🧹</span>
            <progress id="sujeiraBar" class="progress progress-warning flex-1" value="0" max="100"></progress>
            <span id="sujeiraVal" class="text-xs text-gray-500 w-7 text-right">0</span>
        </div>
 
        <div class="flex items-center gap-2 w-60">
            <span class="text-base w-5 text-center">😴</span>
            <progress id="sonoBar" class="progress progress-info flex-1" value="0" max="100"></progress>
            <span id="sonoVal" class="text-xs text-gray-500 w-7 text-right">0</span>
        </div>
 
    </div>
 
    <div class="text-center mt-1">
        <span id="statusLabel" class="badge badge-ghost text-xs font-medium">😊 Feliz</span>
    </div>
 
    <div class="flex flex-col items-center justify-end w-full px-4 gap-5 flex-1 pb-1">
 
        <div id="pet-wrapper">
            <img
                id="b"
                src="normal-removebg-preview.png"
                alt="Bixinho"
                class="w-full h-auto drop-shadow-[0_20px_30px_rgba(0,0,0,0.6)]"
                style="transition: transform 0.35s ease, filter 0.5s ease;"
            />
            <div id="dirt-overlay"></div>
            <div class="eye" id="eye-left"><div class="eye-pupil" id="pupil-left"></div></div>
            <div class="eye" id="eye-right"><div class="eye-pupil" id="pupil-right"></div></div>
        </div>
 
        <div class="flex items-center justify-center gap-4 flex-wrap w-full max-w-sm">
 
            <div class="flex flex-col items-center gap-1">
                <img
                    id="btnCookie"
                    src="cookie-removebg-preview.png"
                    alt="Alimentar"
                    title="Alimentar"
                    class="w-[88px] h-auto cursor-pointer active:scale-95 hover:scale-110 transition duration-200"
                    onclick="alimentar()"
                />
                <span class="text-xs text-gray-600 font-medium">Alimentar</span>
            </div>
 
            <div class="flex flex-col items-center gap-1">
                <button
                    id="btnLimpar"
                    onclick="limpar()"
                    title="Limpar"
                    disabled
                    class="btn btn-warning btn-circle w-14 h-14 text-2xl opacity-40 cursor-not-allowed transition duration-200"
                >🧼</button>
                <span class="text-xs text-gray-600 font-medium">Limpar</span>
            </div>
 
            <div class="flex flex-col items-center gap-1">
                <button
                    id="btnDormir"
                    onclick="toggleDormir()"
                    title="Dormir"
                    class="btn btn-info btn-circle w-14 h-14 text-2xl active:scale-95 hover:scale-110 transition duration-200"
                >😴</button>
                <span id="labelDormir" class="text-xs text-gray-600 font-medium">Dormir</span>
            </div>
 
            <div class="flex flex-col items-center gap-1">
                <button
                    id="btnDianoite"
                    onclick="alternarDiaNoite()"
                    title="Alternar dia/noite"
                    class="btn btn-ghost btn-circle w-14 h-14 text-2xl active:scale-95 hover:scale-110 transition duration-200"
                >🌞</button>
                <span class="text-xs text-gray-600 font-medium">Dia/Noite</span>
            </div>
 
        </div>
    </div>
 
    <div id="toast-container" class="fixed bottom-20 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 z-50 pointer-events-none"></div>
 
    <script src="script.js"></script>
</body>
</html>
